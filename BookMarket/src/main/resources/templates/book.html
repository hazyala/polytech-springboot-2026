<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>도서 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
</head>
<body class="bg-dark text-white">
<div class="container py-4">
    <header class="pb-3 mb-4 border-bottom border-warning">
        <a th:href="@{/home}" class="d-flex align-items-center text-white text-decoration-none">
            <img th:src="@{/imgs/book_logo.png}" style="max-height: 50px;" alt="Book Logo" />
            <span class="fs-4 ms-3">마법사의 도서관</span>
        </a>
    </header>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card bg-secondary bg-opacity-25 border-warning">
                <div class="card-body text-center">
                    <img th:if="${book.fileName != null}" th:src="@{'/images/' + ${book.fileName}}" class="img-fluid rounded mb-3" alt="Book Image" />
                    <img th:unless="${book.fileName != null}" th:src="@{/imgs/book_logo.png}" class="img-fluid rounded mb-3" alt="Book Logo" />
                    <p class="text-muted" th:text="'도서 ID: ' + ${book.bookId}"></p>
                    <p class="text-warning" th:text="${book.category}"></p>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card bg-secondary bg-opacity-25 border-warning">
                <div class="card-body">
                    <h1 th:text="${book.name}"></h1>
                    <p class="text-muted" th:text="'저자: ' + ${book.author}"></p>
                    <p class="text-muted" th:text="'출판사: ' + ${book.publisher}"></p>
                    <p class="text-muted" th:text="'출간일: ' + ${book.releaseDate}"></p>
                    <p class="text-muted" th:text="'재고: ' + ${book.unitsInStock}"></p>
                    <p class="mt-3" th:text="${book.description}"></p>
                    <h3 class="mt-4 text-warning" th:text="${book.unitPrice} + '원'"></h3>
                    <div class="mt-4">
                        <a th:href="@{/books}" class="btn btn-outline-warning me-2">목록으로</a>
                        <a th:href="@{/books/add}" class="btn btn-warning">새 마법 도서 등록</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="pt-3 mt-4 text-body-secondary border-top">
        <span class="text-body-secondary">&copy; 2026 BookMarket</span>
    </footer>
</div>
</body>
</html>
