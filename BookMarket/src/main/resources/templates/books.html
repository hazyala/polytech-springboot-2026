<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>도서 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container py-4">

    <header class="pb-3 mb-4 border-bottom">
        <a th:href="@{/home}" class="d-flex align-items-center text-body-emphasis text-decoration-none">
            <img th:src="@{/imgs/book_logo.png}" style="max-height: 50px;" alt="Logo">&nbsp;&nbsp;
            <span class="fs-4">BookMarket</span>
        </a>
        <a th:href="@{/books/해리포터}" class="nav-link d-inline">해리포터</a>&nbsp;|&nbsp;
        <a th:href="@{/books/JK롤링}" class="nav-link d-inline">JK 롤링</a>
    </header>

    <div class="p-5 mb-4 bg-body-tertiary rounded-3">
        <div class="container-fluid py-5">
            <h1 class="display-5 fw-bold">도서 목록</h1>
            <p class="col-md-8 fs-4">BookMarket</p>
        </div>
    </div>

    <div class="row align-items-md-stretch text-center">
        <div class="col-md-4" th:each="book : ${bookList}">
            <h3 th:text="${book.name}"></h3>
            <p th:text="${book.author}"></p>
            <p th:text="${book.publisher} + ' | ' + ${book.releaseDate}"></p>
            <p align="left" th:text="${book.description}"></p>
            <p th:text="${book.unitPrice} + '원'"></p>

            <p>
                <a th:href="@{/books/book(id=${book.bookId})}" class="btn btn-secondary" role="button">상세정보 &raquo;</a>
            </p>
        </div>
    </div>

</div>
</body>
</html>
