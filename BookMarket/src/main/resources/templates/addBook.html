<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>도서 등록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
</head>
<body class="bg-dark text-white">
<div class="container py-4">
    <header class="pb-3 mb-4 border-bottom border-warning">
        <a th:href="@{/home}" class="d-flex align-items-center text-white text-decoration-none">
            <img th:src="@{/imgs/book_logo.png}" style="max-height: 50px;" alt="Book Logo" />
            <span class="fs-4 ms-3">마법사의 도서관</span>
        </a>
    </header>

    <div class="p-5 mb-4 bg-secondary bg-opacity-25 rounded-3">
        <div class="container-fluid py-5">
            <h1 class="display-5 fw-bold" th:text="${addTitle}"></h1>
            <p class="col-md-8 fs-4">새로운 마법 도서를 등록해보세요.</p>
        </div>
    </div>

    <div class="card bg-secondary bg-opacity-25 border-warning mb-4">
        <div class="card-body">
            <form th:action="@{/books/add}" th:object="${book}" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">도서 ID</label>
                    <input type="text" th:field="*{bookId}" class="form-control" />
                </div>
                <div class="mb-3">
                    <label class="form-label">도서명</label>
                    <input type="text" th:field="*{name}" class="form-control" />
                </div>
                <div class="mb-3">
                    <label class="form-label">가격</label>
                    <input type="text" th:field="*{unitPrice}" class="form-control" />
                </div>
                <div class="mb-3">
                    <label class="form-label">저자</label>
                    <input type="text" th:field="*{author}" class="form-control" />
                </div>
                <div class="mb-3">
                    <label class="form-label">설명</label>
                    <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">출판사</label>
                    <input type="text" th:field="*{publisher}" class="form-control" />
                </div>
                <div class="mb-3">
                    <label class="form-label">카테고리</label>
                    <input type="text" th:field="*{category}" class="form-control" />
                </div>
                <div class="mb-3">
                    <label class="form-label">재고 수량</label>
                    <input type="text" th:field="*{unitsInStock}" class="form-control" />
                </div>
                <div class="mb-3">
                    <label class="form-label">출간일</label>
                    <input type="text" th:field="*{releaseDate}" class="form-control" />
                </div>
                <div class="mb-3">
                    <label class="form-label">도서 이미지</label>
                    <input type="file" th:field="*{bookImage}" class="form-control" />
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-warning">등록하기</button>
                    <a th:href="@{/books}" class="btn btn-outline-light">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
