<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>마법사의 도서관</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
</head>
<body class="bg-dark text-white">
<div class="container-fluid py-4">
    <header class="pb-3 mb-4 border-bottom border-warning">
        <a th:href="@{/home}" class="d-flex align-items-center text-white text-decoration-none">
            <img th:src="@{/imgs/book_logo.png}" style="max-height: 50px;" alt="Book Logo" />
            <span class="fs-4 ms-3">마법사의 도서관</span>
        </a>
    </header>

    <div class="p-5 mb-4 bg-secondary bg-opacity-25 rounded-3">
        <div class="container-fluid py-5">
            <h1 class="display-5 fw-bold">호그와트의 도서관에 오신 것을 환영합니다</h1>
            <p class="col-md-8 fs-4">마법과 모험이 가득한 도서 목록을 탐험해보세요.</p>
        </div>
    </div>

    <div class="row align-items-md-stretch text-center">
        <div class="col-md-12">
            <div class="h-100 p-5 bg-secondary bg-opacity-25 rounded-3">
                <h2>마법사의 추천 도서들을 만나보세요</h2>
                <p>본문을 클릭하면 상세 정보를 확인할 수 있습니다.</p>
                <a th:href="@{/books}" class="btn btn-warning btn-lg mt-3">도서 목록 보기</a>
            </div>
        </div>
    </div>

    <footer class="pt-3 mt-4 text-body-secondary border-top">
        <span class="text-body-secondary">&copy; 2026 BookMarket</span>
    </footer>
</div>
</body>
</html>
