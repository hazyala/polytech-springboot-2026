<!DOCTYPE html>
<html lang="en" xmlns:sec="www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>뷰 페이지 사용자 정보 검색 2</title>
</head>
<body>
<h2>뷰 페이지 사용자 정보 검색</h2>
<div sec:authorize="hasRole('ROLE_ADMIN')">
    <p><b>관리자 권한 화면입니다.</b></p>
</div>
<div sec:authorize="isAuthenticated()">
    <p><b>로그인 중입니다.</b></p>
    <p><b>username: <span sec:authentication="name"></span></b></p>
    <p><b>user Role: <span sec:authentication="authorities"></span></b></p>
    <p><b>user authentication: <span sec:authentication="authenticated"></span></b></p>
    <p><a href="/exam10_01/exam04/">[웹 요청 URL /exam10_1/exam04 이동하기]</a></p>
</div>
<div sec:authorize="isAnonymous()">
    <p><b>로그인이 필요합니다.</b></p>
    <p><a href="exam10_01/admin/tag">[웹 요청 URL /exam10_01/manager/tag]</a></p>
</div>
</body>
</html>
